<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visadel Agency</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        background: linear-gradient(135deg, #2196F3 0%, #1565C0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        width: 100%;
      }
      .header {
        text-align: center;
        color: white;
        margin-bottom: 48px;
      }
      .header h1 {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .header p {
        font-size: 20px;
        opacity: 0.9;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 24px;
      }
      .card {
        background: white;
        border-radius: 24px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        display: block;
      }
      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }
      .card-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }
      .card h2 {
        font-size: 28px;
        color: #2196F3;
        margin-bottom: 12px;
      }
      .card p {
        color: #666;
        font-size: 16px;
        line-height: 1.6;
      }
      .badge {
        display: inline-block;
        background: #00C853;
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        margin-top: 16px;
      }
      @media (max-width: 640px) {
        .header h1 {
          font-size: 36px;
        }
        .header p {
          font-size: 16px;
        }
        .cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Visadel Agency</h1>
        <p>Виза в один клик</p>
      </div>
      <div class="cards">
        <a href="/index.html" class="card">
          <div class="card-icon">📱</div>
          <h2>Mini App</h2>
          <p>Telegram мини-приложение для оформления электронных виз</p>
          <span class="badge">Для пользователей</span>
        </a>
        <a href="/admin-access.html" class="card">
          <div class="card-icon">🔐</div>
          <h2>Админ-панель</h2>
          <p>Управление заявками, пользователями и настройками системы</p>
          <span class="badge">Только для сотрудников</span>
        </a>
      </div>
    </div>
  </body>
</html>
